<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumo de Resultados</title>
    <link rel="stylesheet" href="src/css/estilos.css">
    <link rel="stylesheet" href="src/css/reset.css">
</head>
<body>
    <main class="conteudo">
        <div class="principal">
            <h1 class="titulo">Seu Resultado</h1>
            <div class="circulo">
                <h2>76</h2>
                <p>de 100</p>
            </div>
            <h2 class="avaliacao">Ótimo</h2>
            <p class="subtitle">Você obteve uma pontuação superior a 65% das pessoas que fizeram esses testes.</p>
        </div>
        <div class="resultado">
            <h1 class="titulo1">Resumo</h1>
            <div class="classes">
                <div class="resumo1">
                    <div>
                        <img src="./src/images/raio.png" alt="Raio">
                        <h3>Reação</h3>
                    </div>
                    <p><strong>80</strong> / 100</p>
                </div>
                <div class="resumo2">
                    <div>
                        <img src="./src/images/memoria.png" alt="Memória">
                        <h3>Memória</h3>
                    </div>
                    <p> / 100</p>
                </div>
                <div class="resumo3">
                    <div>
                        <img src="./src/images/mensagem.png" alt="Mensagem">
                        <h3>Verbal</h3>
                    </div>
                    <p><strong>61</strong> / 100</p>
                </div>
                <div class="resumo4">
                    <div>
                        <img src="./src/images/olho.png" alt="olho">
                        <h3>Visual</h3>
                    </div>
                    <p><strong>73</strong> / 100</p>
                </div>
            </div>
            <button class="btn-resumo">Continue</button>
        </div>
    </main>
</body>
</html>
