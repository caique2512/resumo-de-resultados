<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumo de Resultados</title>
</head>
<body>
    <main class="conteudo">
        <div class="principal">
            <h1>Seu Resultado</h1>
            <div class="circulo">
                <h2 class="titulo">76</h2>
                <p>de 100</p>
            </div>
            <h2>Ótimo</h2>
            <p class="subtitle">Você obteve uma pontuação superior a 65% das pessoas que fizeram esses testes.</p>
        </div>
        <div>
            <h1 class="titulo1">Resumo</h1>
            <div class="classes">
                <div class="resumo1">
                    <img src="./src/images/raio.svg" alt="Raio">
                    <h3>Reação</h3>
                    <p><strong>80</strong> / 100</p>
                </div>
                <div class="resumo2">
                    <img src="./src/images/memoria.svg" alt="Memória">
                    <h3>Memória</h3>
                    <p><strong>92</strong> / 100</p>
                </div>
                <div class=""
                    <img src="./src/images/mensagem.svg" alt="Mensagem">
                    <h3>Verbal</h3>
                    <p><strong>61</strong> / 100</p>
                </div>
                <div>
                    <img src="./src/images/olho.svg" alt="olho">
                    <h3>Visual</h3>
                    <p><strong>73</strong> / 100</p>
                </div>
            </div>
            <button class="btn-resumo">Continue</button>
        </div>
    </main>
</body>
</html>
